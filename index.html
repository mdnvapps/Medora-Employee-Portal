const newId = () => "id_" + Math.random().toString(36).slice(2,9);

function StatusBadge({ label, statuses }) {
  const s = statuses.find(x => x.label === label) || { color:"#667085", bg:"#F2F4F7" };
  return <span style={{ background:s.bg, color:s.color, border:`1px solid ${s.color}33`, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:500, whiteSpace:"nowrap" }}>{label}</span>;
}

function EligBadge({ v }) {
  if (!v) return <span style={{color:"#ccc"}}>—</span>;
  const [bg,col] = v==="Yes" ? ["#E1F5EE","#0F6E56"] : v==="No" ? ["#FAECE7","#993C1D"] : ["#FAEEDA","#854F0B"];
  return <span style={{background:bg,color:col,borderRadius:10,padding:"1px 8px",fontSize:11}}>{v}</span>;
}

function DetailRow({ label, children }) {
  return (
    <div style={{borderBottom:"0.5px solid #F2F4F7",paddingBottom:10,marginBottom:2}}>
      <div style={{fontSize:11,color:"#667085",marginBottom:3,fontWeight:500}}>{label}</div>
      <div style={{fontSize:14,fontWeight:500,color:"#101828"}}>{children || "—"}</div>
    </div>
  );
}

function Inp({ value, onChange, type="text", placeholder, disabled }) {
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
    style={{width:"100%",boxSizing:"border-box",padding:"8px 10px",borderRadius:6,border:"0.5px solid #D0D5DD",fontSize:13,background:disabled?"#F9FAFB":"#fff",color:"#101828"}} />;
}

function Sel({ value, onChange, options, disabled }) {
  return <select value={value} onChange={e=>onChange(e.target.value)} disabled={disabled}
    style={{width:"100%",boxSizing:"border-box",padding:"8px 10px",borderRadius:6,border:"0.5px solid #D0D5DD",fontSize:13,background:disabled?"#F9FAFB":"#fff",color:"#101828"}}>
    {options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o||"—"}</option>)}
  </select>;
}

function Field({ label, children, span2 }) {
  return (
    <div style={{gridColumn:span2?"span 2":"span 1",marginBottom:4}}>
      <label style={{display:"block",fontSize:11,color:"#667085",marginBottom:4,fontWeight:500}}>{label}</label>
      {children}
    </div>
  );
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div style={{position:"absolute",top:0,left:0,right:0,minHeight:"100%",background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:50,padding:"70px 16px 32px"}}>
      <div style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:wide?800:660,border:"0.5px solid #E4E7EC",boxShadow:"0 8px 40px rgba(0,0,0,0.2)"}}>

function Toast({ msg, type }) {
  if (!msg) return null;
  const bg = type==="error" ? "#FAECE7" : "#E1F5EE";
  const col = type==="error" ? "#993C1D" : "#0F6E56";
  return <div style={{position:"fixed",bottom:24,right:24,background:bg,color:col,border:`1px solid ${col}33`,borderRadius:8,padding:"10px 18px",fontSize:13,fontWeight:500,zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}}>{msg}</div>;
}

// ─── CALLBACK REMINDER MODAL ─────────────────────────────────────────────────
function CallbackModal({ record, currentUser, onClose, showToast }) {
  const dt = record.callbackDateTime ? record.callbackDateTime.replace("T"," ") : "";
  const [reminderTime, setReminderTime] = useState(record.callbackDateTime || "");
  const [note, setNote] = useState(`Callback reminder: ${record.patientName} – ${record.outcome || "see notes"}`);

  const addToCalendar = () => {
    if (!reminderTime) { showToast("Please set a callback date/time first", "error"); return; }
    const [date, time] = reminderTime.split("T");
    const [yr,mo,dy] = date.split("-");
    const [hr,mn] = (time||"09:00").split(":");
    const start = `${yr}${mo}${dy}T${hr}${mn}00`;
    const end = `${yr}${mo}${dy}T${String(parseInt(hr)+1).padStart(2,"0")}${mn}00`;
    const gcal = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(note)}&dates=${start}/${end}&details=${encodeURIComponent(`Patient: ${record.patientName}\nPhone: ${record.patientPhone}\nStatus: ${record.status}\nNotes: ${record.outcome||record.notes||"—"}`)}`;
    window.open(gcal, "_blank");
    showToast("Calendar invite opened", "success");
    onClose();
  };

  const sendEmail = () => {
    const subject = `Callback Reminder: ${record.patientName}`;
    const body = `Hi ${currentUser.name},\n\nThis is a reminder to call back:\n\nPatient: ${record.patientName}\nPhone: ${record.patientPhone}\nScheduled: ${dt || "TBD"}\nNotes: ${record.outcome || record.notes || "—"}\n\n– Medora Health Group Patient Tracking`;
    const outlookUrl = `https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(currentUser.email)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body.replace(/\n/g,"<br>"))}`;
    window.open(outlookUrl, "_blank");
    showToast("Opening reminder in Outlook Web...", "success");
    onClose();
  };

  return (
    <div>
      <div style={{background:"#F5F7FA",borderRadius:8,padding:"12px 14px",marginBottom:16,fontSize:13}}>
        <div style={{fontWeight:600,color:NAVY,marginBottom:4}}>{record.patientName}</div>
        <div style={{color:"#667085"}}>{record.patientPhone} · {record.status}</div>
        {dt && <div style={{color:TEAL,marginTop:4,fontWeight:500}}>Scheduled callback: {dt}</div>}
      </div>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:11,color:"#667085",marginBottom:4,fontWeight:500}}>Callback Date / Time</label>
        <Inp value={reminderTime} onChange={setReminderTime} type="datetime-local" />
      </div>
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:11,color:"#667085",marginBottom:4,fontWeight:500}}>Reminder note</label>
        <Inp value={note} onChange={setNote} />
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button onClick={addToCalendar} style={{flex:1,padding:"10px 16px",borderRadius:6,border:"none",background:NAVY,color:"#fff",fontWeight:500,cursor:"pointer",fontSize:13}}>
          📅 Add to Google Calendar
        </button>
        <button onClick={sendEmail} style={{flex:1,padding:"10px 16px",borderRadius:6,border:"none",background:"#0078D4",color:"#fff",fontWeight:500,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M24 7.387v13.476c0 .621-.379 1.165-.933 1.399L15.93 24V12.811l2.386-.614V9.785l-2.386.614V7.988L13.5 8.898v2.411l-2.318.596V9.494L9.25 10.39v2.41l-2.318.597V10.99L4.614 11.9v10.765L.933 22.262C.379 22.028 0 21.484 0 20.863V7.387c0-.694.448-1.307 1.109-1.512L12 2.498l10.891 3.377C23.552 6.08 24 6.693 24 7.387z"/></svg>
          Outlook reminder
        </button>
      </div>
      <div style={{marginTop:12,fontSize:11,color:"#667085",textAlign:"center"}}>Reminder will be sent to: {currentUser.email}</div>
    </div>
  );
}

function AdminPanel({ users, setUsers, statuses, setStatuses, referrals, setReferrals, showToast }) {
  const [tab, setTab] = useState("users");
  const [newUser, setNewUser] = useState({ name:"", email:"", role:"user", password:"" });
  const [newStatus, setNewStatus] = useState({ label:"", color:"#1B2A4A", bg:"#E8ECF4" });
  const [newRef, setNewRef] = useState("");
  const [inviteEmail, setInviteEmail] = useState("");

  const tabStyle = active => ({
    padding:"8px 18px", borderRadius:6, border:"none", cursor:"pointer", fontSize:13, fontWeight:500,
    background: active ? NAVY : "transparent", color: active ? "#fff" : "#667085"
  });

  const addUser = () => {
    if (!newUser.name || !newUser.email || !newUser.password) { showToast("Fill in all fields", "error"); return; }
    setUsers(u => [...u, { ...newUser, id: newId(), active: true }]);
    setNewUser({ name:"", email:"", role:"user", password:"" });
    showToast("User added", "success");
  };

  const sendInvite = (user) => {
    const subject = `You've been invited to Medora Health Group Patient Tracking`;
    const body = `Hi ${user.name},\n\nYou have been added to the Medora Health Group Patient Tracking Portal.\n\nLogin: ${user.email}\nTemporary password: ${user.password}\n\nPlease log in and change your password.\n\n– Medora Health Group`;
    const outlookInvite = `https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(user.email)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body.replace(/\n/g,"<br>"))}`;
    window.open(outlookInvite, "_blank");
    showToast(`Opening invite for ${user.email} in Outlook...`, "success");
  };

  const toggleUser = (id) => setUsers(u => u.map(x => x.id===id ? {...x,active:!x.active} : x));

  const addStatus = () => {
    if (!newStatus.label) { showToast("Status label required", "error"); return; }

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px 16px",marginBottom:12}}>
              <Field label="Label"><Inp value={newStatus.label} onChange={v=>setNewStatus(p=>({...p,label:v}))} placeholder="e.g. Waitlisted" /></Field>
              <Field label="Text Color"><input type="color" value={newStatus.color} onChange={e=>setNewStatus(p=>({...p,color:e.target.value}))} style={{width:"100%",height:38,borderRadius:6,border:"0.5px solid #D0D5DD",cursor:"pointer"}} /></Field>
              <Field label="Background Color"><input type="color" value={newStatus.bg} onChange={e=>setNewStatus(p=>({...p,bg:e.target.value}))} style={{width:"100%",height:38,borderRadius:6,border:"0.5px solid #D0D5DD",cursor:"pointer"}} /></Field>
            </div>
            {newStatus.label && <div style={{marginBottom:12}}><StatusBadge label={newStatus.label} statuses={[...statuses,{...newStatus,id:"preview"}]} /></div>}
            <button onClick={addStatus} style={{padding:"8px 20px",borderRadius:6,border:"none",background:NAVY,color:"#fff",fontWeight:500,fontSize:13,cursor:"pointer"}}>Add status</button>
          </div>
        </div>
      )}

      {/* REFERRALS TAB */}
      {tab==="referrals" && (
        <div>
          {pending.length > 0 && (
            <div style={{background:"#fff",borderRadius:12,border:"1px solid #F0957B",overflow:"hidden",marginBottom:20}}>
              <div style={{padding:"12px 16px",borderBottom:"0.5px solid #F2F4F7",fontWeight:600,color:"#993C1D",fontSize:14}}>⚠ Pending Approval ({pending.length})</div>
              {pending.map(r=>(
                <div key={r.id} style={{padding:"12px 16px",borderBottom:"0.5px solid #F2F4F7",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
                  <div>
                    <span style={{fontWeight:500,fontSize:13}}>{r.label}</span>
                    {r.correction && <span style={{marginLeft:8,fontSize:12,color:"#854F0B"}}>→ Suggested correction: "{r.correction}"</span>}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>approveRef(r.id)} style={{padding:"5px 14px",borderRadius:6,border:"none",background:"#E1F5EE",color:"#0F6E56",cursor:"pointer",fontSize:12,fontWeight:500}}>✓ Approve</button>
                    <button onClick={()=>rejectRef(r.id,r.correction||"")} style={{padding:"5px 14px",borderRadius:6,border:"none",background:"#FAECE7",color:"#993C1D",cursor:"pointer",fontSize:12,fontWeight:500}}>✗ Reject / Correct</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          <div style={{background:"#fff",borderRadius:12,border:"0.5px solid #E4E7EC",overflow:"hidden",marginBottom:20}}>
            <div style={{padding:"12px 16px",borderBottom:"0.5px solid #E4E7EC",fontWeight:600,color:NAVY,fontSize:14}}>Approved Referral Sources</div>
            {approved.map(r=>(
              <div key={r.id} style={{padding:"10px 16px",borderBottom:"0.5px solid #F2F4F7",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:13,fontWeight:500}}>{r.label}</span>
                <button onClick={()=>deleteRef(r.id)} style={{fontSize:11,color:"#993C1D",background:"none",border:"none",cursor:"pointer"}}>Remove</button>
              </div>
            ))}
          </div>

          <div style={{background:"#fff",borderRadius:12,border:"0.5px solid #E4E7EC",padding:"16px 20px"}}>
            <div style={{fontWeight:600,color:NAVY,fontSize:14,marginBottom:6}}>Submit New Referral Source</div>
            <div style={{fontSize:12,color:"#667085",marginBottom:12}}>Submitted sources require admin approval before appearing in records.</div>
            <div style={{display:"flex",gap:10}}>
              <Inp value={newRef} onChange={setNewRef} placeholder="e.g. Social Media, Flyer" />
              <button onClick={submitRef} style={{padding:"8px 18px",borderRadius:6,border:"none",background:NAVY,color:"#fff",fontWeight:500,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>Submit</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginPage({ users, onLogin }) {
  const [email, setEmail] = useState(""), [pass, setPass] = useState(""), [err, setErr] = useState("");
  const submit = () => {
    const u = users.find(x => x.email===email && x.password===pass && x.active);
    if (u) onLogin(u); else setErr("Invalid credentials or account inactive.");
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F5F7FA"}}>
      <div style={{width:340,background:"#fff",borderRadius:14,border:"1px solid #E4E7EC",padding:"36px 32px"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <img src={LOGO} alt="Medora Health Group" style={{width:200,height:"auto",margin:"0 auto 12px",display:"block"}} />
          <div style={{fontSize:13,color:"#667085",marginTop:4}}>Patient Tracking Portal</div>
        </div>
        {err && <div style={{background:"#FAECE7",color:"#993C1D",borderRadius:6,padding:"8px 12px",fontSize:13,marginBottom:12}}>{err}</div>}
        <label style={{display:"block",fontSize:12,color:"#667085",marginBottom:4}}>Email</label>
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" type="email"
          style={{width:"100%",boxSizing:"border-box",padding:"9px 12px",borderRadius:6,border:"1px solid #D0D5DD",fontSize:14,marginBottom:12}} />
        <label style={{display:"block",fontSize:12,color:"#667085",marginBottom:4}}>Password</label>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}
          style={{width:"100%",boxSizing:"border-box",padding:"9px 12px",borderRadius:6,border:"1px solid #D0D5DD",fontSize:14,marginBottom:20}} />
        <button onClick={submit} style={{width:"100%",padding:"10px",borderRadius:6,border:"none",background:NAVY,color:"#fff",fontWeight:600,fontSize:15,cursor:"pointer"}}>Sign in</button>

      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [users, setUsers] = useState(DEFAULT_USERS);
  const [statuses, setStatuses] = useState(DEFAULT_STATUSES);
  const [referrals, setReferrals] = useState(DEFAULT_REFERRALS);
  const [records, setRecords] = useState(SAMPLE_RECORDS);
  const [currentUser, setCurrentUser] = useState(null);
  const [page, setPage] = useState("tracker"); // "tracker" | "admin"
  const [modal, setModal] = useState(null);
  const [filterStatus, setFilterStatus] = useState("All");
  const [search, setSearch] = useState("");
  const [nextId, setNextId] = useState(100);
  const [toast, setToast] = useState({ msg:"", type:"success" });

  const showToast = (msg, type="success") => {
    setToast({ msg, type });
    setTimeout(() => setToast({ msg:"", type:"success" }), 3000);
  };

  const filtered = useMemo(() => records.filter(r => {
    const ms = filterStatus==="All" || r.status===filterStatus;
    const q = search.toLowerCase();
    return ms && (!q || r.patientName.toLowerCase().includes(q) || r.patientPhone.includes(q) || (r.caregiverName||"").toLowerCase().includes(q));
  }), [records, filterStatus, search]);

  const stats = useMemo(() => {
    const o={}; statuses.forEach(s=>o[s.label]=records.filter(r=>r.status===s.label).length); return o;
  }, [records, statuses]);

  const canEdit = (record) => currentUser?.role==="admin" || record.createdBy===currentUser?.id;

  const saveRecord = (form) => {
    if (form.id) setRecords(r=>r.map(x=>x.id===form.id?form:x));
    else { setRecords(r=>[...r,{...form,id:nextId}]); setNextId(n=>n+1); }
    setModal(null);
    showToast("Record saved");
  };

  const deleteRecord = (id) => {
    if (window.confirm("Delete this record?")) { setRecords(r=>r.filter(x=>x.id!==id)); setModal(null); showToast("Record deleted"); }
  };

  const pendingRefCount = referrals.filter(r=>!r.approved).length;

  if (!currentUser) return <LoginPage users={users} onLogin={u=>{setCurrentUser(u);setPage("tracker");}} />;

  const hasModal = modal !== null;

  return (
    <div style={{minHeight:"100vh",background:"#F5F7FA",position:"relative"}}>
      {/* Header */}
      <header style={{background:NAVY,padding:"0 20px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",position:"relative",zIndex:2}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <img src={LOGO} alt="Medora Health Group" style={{height:30,width:"auto",filter:"brightness(0) invert(1)"}} />
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setPage("tracker")} style={{background:page==="tracker"?"rgba(255,255,255,0.15)":"none",border:"none",color:"#fff",padding:"5px 12px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:page==="tracker"?600:400}}>Tracker</button>
            {currentUser.role==="admin" && (
              <button onClick={()=>setPage("admin")} style={{background:page==="admin"?"rgba(255,255,255,0.15)":"none",border:"none",color:"#fff",padding:"5px 12px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:page==="admin"?600:400,display:"flex",alignItems:"center",gap:6}}>
                Admin
                {pendingRefCount>0 && <span style={{background:"#FAECE7",color:"#993C1D",borderRadius:20,padding:"1px 7px",fontSize:11,fontWeight:600}}>{pendingRefCount}</span>}
              </button>
            )}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{color:"#8BA0C0",fontSize:12}}>{currentUser.name} · <span style={{color:currentUser.role==="admin"?TEAL:"#8BA0C0"}}>{currentUser.role}</span></span>
          <button onClick={()=>setCurrentUser(null)} style={{background:"none",border:"0.5px solid #8BA0C0",color:"#ccc",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12}}>Sign out</button>
        </div>
      </header>

      {/* Admin page */}
      {page==="admin" && currentUser.role==="admin" && (
        <AdminPanel users={users} setUsers={setUsers} statuses={statuses} setStatuses={setStatuses} referrals={referrals} setReferrals={setReferrals} showToast={showToast} />
      )}

      {/* Tracker page */}
      {page==="tracker" && (
        <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 14px",filter:hasModal?"blur(1px)":"none",pointerEvents:hasModal?"none":"auto",transition:"filter 0.15s"}}>
          {/* Stat cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:20}}>
            {statuses.filter(s=>s.active).map(s=>(
              <div key={s.id} onClick={()=>setFilterStatus(filterStatus===s.label?"All":s.label)}
                style={{background:"#fff",border:`0.5px solid ${filterStatus===s.label?s.color:"#E4E7EC"}`,borderLeft:`3px solid ${s.color}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",outline:filterStatus===s.label?`2px solid ${s.color}`:"none"}}>
                <div style={{fontSize:22,fontWeight:700,color:s.color}}>{stats[s.label]||0}</div>
                <div style={{fontSize:11,color:"#667085",marginTop:2,lineHeight:1.3}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Table */}
          <div style={{background:"#fff",borderRadius:12,border:"0.5px solid #E4E7EC",overflow:"hidden"}}>
            <div style={{padding:"12px 14px",borderBottom:"0.5px solid #E4E7EC",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or phone…"
                style={{flex:1,minWidth:160,padding:"7px 11px",borderRadius:6,border:"0.5px solid #D0D5DD",fontSize:13}} />
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
                style={{padding:"7px 11px",borderRadius:6,border:"0.5px solid #D0D5DD",fontSize:13,background:"#fff"}}>
                <option value="All">All statuses</option>
                {statuses.filter(s=>s.active).map(s=><option key={s.id}>{s.label}</option>)}
              </select>
              <button onClick={()=>setModal({type:"add",data:{id:null,status:statuses.find(s=>s.active)?.label||"",patientName:"",patientPhone:"",caregiverName:"",caregiverRelationship:"",caregiverPhone:"",caregiverEmail:"",referralSource:"",eligibilityConfirmed:"",attemptNumber:"",dateOfAttempt:"",outcome:"",voicemailLeft:"",callbackDateTime:"",notes:"",createdBy:currentUser.id}})}
                style={{padding:"7px 14px",borderRadius:6,border:"none",background:NAVY,color:"#fff",fontWeight:500,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>+ Add record</button>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"#F9FAFB"}}>
                  {["Status","Patient Name","Phone","Caregiver","Relationship","Referral","Eligibility","#","Date","Voicemail","Callback",""].map(h=>(
                    <th key={h} style={{padding:"9px 10px",textAlign:"left",fontWeight:500,color:"#667085",borderBottom:"0.5px solid #E4E7EC",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {filtered.length===0 && <tr><td colSpan={12} style={{padding:32,textAlign:"center",color:"#aaa"}}>No records found.</td></tr>}
                  {filtered.map(r=>(
                    <tr key={r.id} onClick={()=>setModal({type:"view",data:r})} style={{borderBottom:"0.5px solid #F2F4F7",cursor:"pointer"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#F9FAFB"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                      <td style={{padding:"9px 10px"}}><StatusBadge label={r.status} statuses={statuses} /></td>
                      <td style={{padding:"9px 10px",fontWeight:500,color:NAVY,whiteSpace:"nowrap"}}>{r.patientName}</td>
                      <td style={{padding:"9px 10px",color:"#667085"}}>{r.patientPhone}</td>
                      <td style={{padding:"9px 10px"}}>{r.caregiverName||<span style={{color:"#ccc"}}>—</span>}</td>
                      <td style={{padding:"9px 10px",color:"#667085"}}>{r.caregiverRelationship||"—"}</td>
                      <td style={{padding:"9px 10px",color:"#667085"}}>{r.referralSource||"—"}</td>
                      <td style={{padding:"9px 10px"}}><EligBadge v={r.eligibilityConfirmed} /></td>
                      <td style={{padding:"9px 10px",textAlign:"center"}}>{r.attemptNumber||"—"}</td>
                      <td style={{padding:"9px 10px",color:"#667085",whiteSpace:"nowrap"}}>{r.dateOfAttempt||"—"}</td>
                      <td style={{padding:"9px 10px",color:r.voicemailLeft==="Yes"?"#0F6E56":r.voicemailLeft==="No"?"#993C1D":"#667085"}}>{r.voicemailLeft||"—"}</td>
                      <td style={{padding:"9px 10px",color:"#667085",whiteSpace:"nowrap"}}>{r.callbackDateTime?r.callbackDateTime.replace("T"," "):"—"}</td>
                      <td style={{padding:"9px 10px"}} onClick={e=>{e.stopPropagation();canEdit(r)&&setModal({type:"edit",data:{...r}});}}>
                        {canEdit(r) && <span style={{color:TEAL,fontSize:12,cursor:"pointer"}}>Edit</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{padding:"9px 14px",borderTop:"0.5px solid #E4E7EC",fontSize:12,color:"#999"}}>{filtered.length} of {records.length} records</div>
          </div>
        </div>
      )}

      {/* Modals */}
      {hasModal && page==="tracker" && (
        <div style={{position:"absolute",top:0,left:0,right:0,minHeight:"100%",background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:40,padding:"70px 16px 32px"}}>
          <div style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:modal.type==="email"||modal.type==="view"?700:660,border:"0.5px solid #E4E7EC",boxShadow:"0 8px 40px rgba(0,0,0,0.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px",borderBottom:"0.5px solid #E4E7EC"}}>
              <span style={{fontWeight:600,fontSize:15,color:NAVY}}>
                {modal.type==="add"?"Add new record":modal.type==="edit"?"Edit record":modal.type==="email"?"Send patient summary email":modal.type==="callback"?"Callback reminder":modal.type==="addref"?"Submit referral source":"Record detail"}
              </span>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",fontSize:22,color:"#667085",cursor:"pointer",lineHeight:1}}>×</button>
            </div>
            <div style={{padding:"20px",maxHeight:"75vh",overflowY:"auto"}}>
              {(modal.type==="add"||modal.type==="edit") && (
                <RecordForm initial={modal.data} onSave={saveRecord} onCancel={()=>setModal(null)} statuses={statuses} referrals={referrals} currentUser={currentUser} />
              )}
              {modal.type==="view" && (()=>{
                const r=modal.data;
                const owner = users.find(u=>u.id===r.createdBy);
                return (
                  <div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px",marginBottom:8}}>
                      <DetailRow label="Status"><StatusBadge label={r.status} statuses={statuses} /></DetailRow>
                      <DetailRow label="Attempt #">{r.attemptNumber}</DetailRow>
                      <DetailRow label="Patient Name">{r.patientName}</DetailRow>
                      <DetailRow label="Patient Phone">{r.patientPhone}</DetailRow>
                      <DetailRow label="Caregiver Name">{r.caregiverName}</DetailRow>
                      <DetailRow label="Relationship">{r.caregiverRelationship}</DetailRow>
                      <DetailRow label="Caregiver Phone">{r.caregiverPhone}</DetailRow>
                      <DetailRow label="Caregiver Email">{r.caregiverEmail}</DetailRow>
                      <DetailRow label="Referral Source">{r.referralSource}</DetailRow>
                      <DetailRow label="Eligibility Confirmed">{r.eligibilityConfirmed}</DetailRow>
                      <DetailRow label="Date of Attempt">{r.dateOfAttempt}</DetailRow>
                      <DetailRow label="Voicemail Left">{r.voicemailLeft}</DetailRow>
                      <div style={{gridColumn:"span 2"}}><DetailRow label="Callback Date / Time">{r.callbackDateTime?r.callbackDateTime.replace("T"," "):null}</DetailRow></div>
                      <div style={{gridColumn:"span 2"}}><DetailRow label="Outcome / Notes">{r.outcome}</DetailRow></div>
                      <div style={{gridColumn:"span 2"}}><DetailRow label="Additional Notes">{r.notes}</DetailRow></div>
                      {owner && <div style={{gridColumn:"span 2"}}><DetailRow label="Created by">{owner.name}</DetailRow></div>}
                    </div>
                    <div style={{display:"flex",gap:8,paddingTop:14,borderTop:"0.5px solid #E4E7EC",flexWrap:"wrap"}}>
                      {canEdit(r) && <button onClick={()=>setModal({type:"edit",data:{...r}})} style={{padding:"8px 16px",borderRadius:6,border:"none",background:NAVY,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500}}>Edit</button>}
                      <button onClick={()=>setModal({type:"email",data:r})} style={{padding:"8px 16px",borderRadius:6,border:`1px solid ${TEAL}`,background:"none",color:TEAL,cursor:"pointer",fontSize:13,fontWeight:500}}>✉ Email summary</button>
                      <button onClick={()=>setModal({type:"callback",data:r})} style={{padding:"8px 16px",borderRadius:6,border:"1px solid #667085",background:"none",color:"#667085",cursor:"pointer",fontSize:13}}>📅 Callback reminder</button>
                      {canEdit(r) && <button onClick={()=>deleteRecord(r.id)} style={{padding:"8px 16px",borderRadius:6,border:"0.5px solid #F0957B",color:"#993C1D",background:"none",cursor:"pointer",fontSize:13}}>Delete</button>}
                      <button onClick={()=>setModal(null)} style={{marginLeft:"auto",padding:"8px 16px",borderRadius:6,border:"0.5px solid #D0D5DD",background:"none",cursor:"pointer",fontSize:13}}>Close</button>
                    </div>
                  </div>
                );
              })()}
              {modal.type==="email" && <EmailModal record={modal.data} currentUser={currentUser} users={users} onClose={()=>setModal(null)} showToast={showToast} />}
              {modal.type==="callback" && <CallbackModal record={modal.data} currentUser={currentUser} onClose={()=>setModal(null)} showToast={showToast} />}
              {modal.type==="addref" && (
                <div>
                  <p style={{fontSize:13,color:"#667085",marginBottom:12}}>Submitted referral sources require admin approval before appearing in records.</p>
                  <Field label="Referral source name">
                    <Inp value={modal.newRef||""} onChange={v=>setModal(m=>({...m,newRef:v}))} placeholder="e.g. Social Media, Church Flyer" />
                  </Field>
                  <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
                    <button onClick={()=>setModal(null)} style={{padding:"8px 18px",borderRadius:6,border:"0.5px solid #D0D5DD",background:"none",cursor:"pointer",fontSize:13}}>Cancel</button>
                    <button onClick={()=>{
                      if(modal.newRef?.trim()){
                        setReferrals(r=>[...r,{id:newId(),label:modal.newRef.trim(),approved:false,correction:null}]);
                        showToast("Submitted for admin approval","success");
                        setModal(null);
                      }
                    }} style={{padding:"8px 18px",borderRadius:6,border:"none",background:NAVY,color:"#fff",fontWeight:500,fontSize:13,cursor:"pointer"}}>Submit for approval</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <Toast msg={toast.msg} type={toast.type} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
