<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medora Health Group — Patient Tracking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#F5F7FA;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}
.hide{display:none!important}
.badge{border-radius:20px;padding:2px 10px;font-size:12px;font-weight:500;white-space:nowrap;border:1px solid transparent;display:inline-block}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.btn-navy{background:#1B2A4A;color:#fff}
.btn-outline{background:none;border:0.5px solid #D0D5DD;color:#344054}
.btn-red{background:none;border:0.5px solid #F0957B;color:#993C1D}
.btn-teal{background:none;border:1px solid #2BA8B4;color:#2BA8B4}
.btn-blue{background:#0078D4;color:#fff}
.inp{width:100%;padding:8px 10px;border-radius:6px;border:0.5px solid #D0D5DD;font-size:13px;color:#101828;background:#fff}
.sel{width:100%;padding:8px 10px;border-radius:6px;border:0.5px solid #D0D5DD;font-size:13px;color:#101828;background:#fff}
.card{background:#fff;border-radius:12px;border:0.5px solid #E4E7EC;overflow:hidden}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-start;justify-content:center;z-index:50;padding:70px 16px 32px;overflow-y:auto}
.mbox{background:#fff;border-radius:12px;width:100%;max-width:660px;border:0.5px solid #E4E7EC;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:0.5px solid #E4E7EC}
.mbody{padding:20px;max-height:70vh;overflow-y:auto}
.fl{display:block;font-size:11px;color:#667085;margin-bottom:4px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.s2{grid-column:span 2}
.sdiv{border-top:0.5px solid #E4E7EC;margin:12px 0 8px;padding-top:10px;font-size:12px;font-weight:600;color:#1B2A4A}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 10px;text-align:left;font-weight:500;color:#667085;border-bottom:0.5px solid #E4E7EC;white-space:nowrap;background:#F9FAFB}
td{padding:9px 10px;border-bottom:0.5px solid #F2F4F7}
.crow:hover td{background:#F9FAFB;cursor:pointer}
.scard{background:#fff;border:0.5px solid #E4E7EC;border-radius:10px;padding:12px 14px;cursor:pointer;transition:outline 0.1s}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.tab{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:#667085}
.tab.on{background:#1B2A4A;color:#fff}
.dr{border-bottom:0.5px solid #F2F4F7;padding-bottom:10px;margin-bottom:2px}
.dl{font-size:11px;color:#667085;margin-bottom:3px;font-weight:500}
.dv{font-size:14px;font-weight:500;color:#101828}
</style>
</head>

// ── STORAGE ────────────────────────────────────────────────────────────────
function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function save() {
  try {
    localStorage.setItem('mhg_u', JSON.stringify(S.users));
    localStorage.setItem('mhg_s', JSON.stringify(S.statuses));
    localStorage.setItem('mhg_r', JSON.stringify(S.referrals));
    localStorage.setItem('mhg_rec', JSON.stringify(S.records));
    localStorage.setItem('mhg_id', String(S.nextId));
  } catch(e) { console.warn('Storage unavailable', e); }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
const uid = () => 'x' + Math.random().toString(36).slice(2,9);
const h = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $ = id => document.getElementById(id);
const getSt = lbl => S.statuses.find(s=>s.label===lbl) || {color:'#667085',bg:'#F2F4F7'};
const canEdit = r => S.user && (S.user.role==='admin' || r.createdBy===S.user.id);

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast';
  const ok = type !== 'error';
  t.style.cssText = `background:${ok?'#E1F5EE':'#FAECE7'};color:${ok?'#0F6E56':'#993C1D'};border:1px solid ${ok?'#9FE1CB':'#F0957B'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function commit(msg) { save(); toast(msg); }

function badge(lbl) {
  const s = getSt(lbl);
  return `<span class="badge" style="background:${s.bg};color:${s.color};border-color:${s.color}33">${h(lbl)}</span>`;
}
function eligBadge(v) {
  if(!v) return '<span style="color:#ccc">—</span>';
  const [bg,col] = v==='Yes'?['#E1F5EE','#0F6E56']:v==='No'?['#FAECE7','#993C1D']:['#FAEEDA','#854F0B'];
  return `<span class="badge" style="background:${bg};color:${col}">${h(v)}</span>`;
}

// ── RENDER ROOT ────────────────────────────────────────────────────────────
function render() {
  const root = $('root');
  if (!S.user) { root.innerHTML = loginPage(); bindLogin(); return; }
  root.innerHTML = shell(S.page === 'admin' && S.user.role === 'admin' ? adminPage() : trackerPage());
  bindTracker();
  if (S.modal) showModal();
}

function rerender() {
  if (!S.user) return;
  const root = $('root');
  root.innerHTML = shell(S.page === 'admin' && S.user.role === 'admin' ? adminPage() : trackerPage());
  bindTracker();
  if (S.modal) showModal();
}

  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="width:340px;background:#fff;border-radius:14px;border:1px solid #E4E7EC;padding:36px 32px">
    <div style="text-align:center;margin-bottom:24px">
      <img src="${LOGO}" style="width:200px;height:auto;display:block;margin:0 auto 12px" alt="Medora Health Group"/>
      <div style="font-size:13px;color:#667085">Patient Tracking Portal</div>
    </div>
    <div id="lerr" class="hide" style="background:#FAECE7;color:#993C1D;border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:12px"></div>
    <label class="fl">Email</label>
    <input id="lem" type="email" class="inp" placeholder="your@email.com" style="margin-bottom:12px"/>
    <label class="fl">Password</label>
    <input id="lpw" type="password" class="inp" placeholder="Password" style="margin-bottom:20px"/>
    <button id="lbtn" class="btn btn-navy" style="width:100%;padding:10px;font-size:15px">Sign in</button>
  </div></div>`;
}
function bindLogin() {
  function doLogin() {
    const em = $('lem').value.trim().toLowerCase();
    const pw = $('lpw').value;
    const u = S.users.find(x => x.email.toLowerCase()===em && x.password===pw && x.active);
    if (u) { S.user = u; render(); }
    else { const e=$('lerr'); e.textContent='Invalid credentials or account inactive.'; e.classList.remove('hide'); }
  }
  $('lbtn').onclick = doLogin;
  $('lpw').onkeydown = e => { if(e.key==='Enter') doLogin(); };
}

// ── SHELL ──────────────────────────────────────────────────────────────────

        ${isA ? `<button class="tab ${S.page==='admin'?'on':''}" id="nav-admin" style="color:${S.page==='admin'?'#fff':'#8BA0C0'}">Admin${pr>0?` <span style="background:#FAECE7;color:#993C1D;border-radius:20px;padding:1px 7px;font-size:11px">${pr}</span>`:''}</button>` : ''}

// ── TRACKER ────────────────────────────────────────────────────────────────
function trackerPage() {
  const filt = S.records.filter(r => {
    const ms = S.filter==='All' || r.status===S.filter;
    const q = S.search.toLowerCase();
    return ms && (!q || r.patientName.toLowerCase().includes(q) || r.patientPhone.includes(q) || (r.caregiverName||'').toLowerCase().includes(q));
  });
  const stats = {};
  S.statuses.forEach(s => stats[s.label] = S.records.filter(r=>r.status===s.label).length);

  const cards = S.statuses.filter(s=>s.active).map(s =>
    `<div class="scard" data-filter="${h(s.label)}" style="border-left:3px solid ${s.color};${S.filter===s.label?`outline:2px solid ${s.color};`:''}">
      <div style="font-size:22px;font-weight:700;color:${s.color}">${stats[s.label]||0}</div>
      <div style="font-size:11px;color:#667085;margin-top:2px;line-height:1.3">${h(s.label)}</div>
    </div>`).join('');

  const rows = filt.length === 0
    ? `<tr><td colspan="12" style="padding:32px;text-align:center;color:#aaa">No records found.</td></tr>`
    : filt.map(r =>
      `<tr class="crow" data-id="${r.id}">
        <td>${badge(r.status)}</td>
        <td style="font-weight:500;color:${NAVY};white-space:nowrap">${h(r.patientName)}</td>
        <td style="color:#667085">${h(r.patientPhone)}</td>
        <td>${h(r.caregiverName)||'<span style="color:#ccc">—</span>'}</td>
        <td style="color:#667085">${h(r.caregiverRelationship)||'—'}</td>
        <td style="color:#667085">${h(r.referralSource)||'—'}</td>
        <td>${eligBadge(r.eligibilityConfirmed)}</td>
        <td style="text-align:center">${r.attemptNumber||'—'}</td>
        <td style="color:#667085;white-space:nowrap">${r.dateOfAttempt||'—'}</td>
        <td style="color:${r.voicemailLeft==='Yes'?'#0F6E56':r.voicemailLeft==='No'?'#993C1D':'#667085'}">${r.voicemailLeft||'—'}</td>
        <td style="color:#667085;white-space:nowrap">${r.callbackDateTime?r.callbackDateTime.replace('T',' '):'—'}</td>
        <td>${canEdit(r)?`<span class="edit-rec" data-id="${r.id}" style="color:${TEAL};cursor:pointer;font-size:12px">Edit</span>`:''}</td>
      </tr>`).join('');

  return `<div style="max-width:1100px;margin:0 auto;padding:20px 14px">
    <div id="stat-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px">${cards}</div>
    <div class="card">
      <div style="padding:12px 14px;border-bottom:0.5px solid #E4E7EC;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <input id="srch" class="inp" placeholder="Search by name or phone…" value="${h(S.search)}" style="flex:1;min-width:160px"/>
        <select id="sfilt" class="sel" style="width:auto">
          <option value="All" ${S.filter==='All'?'selected':''}>All statuses</option>
          ${S.statuses.filter(s=>s.active).map(s=>`<option value="${h(s.label)}" ${S.filter===s.label?'selected':''}>${h(s.label)}</option>`).join('')}
        </select>
        <button id="btn-add" class="btn btn-navy">+ Add record</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>${['Status','Patient Name','Phone','Caregiver','Relationship','Referral','Eligibility','#','Date','Voicemail','Callback',''].map(c=>`<th>${c}</th>`).join('')}</tr></thead>
          <tbody id="rec-body">${rows}</tbody>
        </table>
      </div>
      <div style="padding:9px 14px;border-top:0.5px solid #E4E7EC;font-size:12px;color:#999">${filt.length} of ${S.records.length} records</div>
    </div>
  </div>`;
}

function bindTracker() {
  // nav
  const nt = $('nav-tracker'); if(nt) nt.onclick = () => { S.page='tracker'; rerender(); };
  const na = $('nav-admin'); if(na) na.onclick = () => { S.page='admin'; rerender(); };
  const np = $('nav-pw'); if(np) np.onclick = () => openModal('changepw', {userId: S.user.id});
  const no = $('nav-out'); if(no) no.onclick = () => { S.user=null; S.modal=null; render(); };
  // tracker
  const srch = $('srch'); if(srch) srch.oninput = e => { S.search=e.target.value; rerender(); };
  const sf = $('sfilt'); if(sf) sf.onchange = e => { S.filter=e.target.value; rerender(); };
  const ba = $('btn-add'); if(ba) ba.onclick = () => openModal('add', newRec());
  // stat cards
  document.querySelectorAll('.scard').forEach(c => {
    c.onclick = () => { const lbl=c.dataset.filter; S.filter=S.filter===lbl?'All':lbl; rerender(); };
  });
  // table rows
  document.querySelectorAll('.crow').forEach(r => {
    r.onclick = () => { const rec=S.records.find(x=>x.id==r.dataset.id); if(rec) openModal('view',rec); };
  });
  document.querySelectorAll('.edit-rec').forEach(e => {
    e.onclick = ev => { ev.stopPropagation(); const rec=S.records.find(x=>x.id==e.dataset.id); if(rec) openModal('edit',{...rec}); };
  });
}

function newRec() {
  return {id:null,status:S.statuses.find(s=>s.active)?.label||'',patientName:'',patientPhone:'',caregiverName:'',caregiverRelationship:'',caregiverPhone:'',caregiverEmail:'',referralSource:'',eligibilityConfirmed:'',attemptNumber:'',dateOfAttempt:'',outcome:'',voicemailLeft:'',callbackDateTime:'',notes:'',createdBy:S.user.id};
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(type, data) {
  S.modal = {type, data};
  showModal();
}

function showModal() {
  let ov = $('ov'); if(ov) ov.remove();
  ov = document.createElement('div');
  ov.id = 'ov'; ov.className = 'overlay';
  const titles = {add:'Add new record',edit:'Edit record',view:'Record detail',email:'Send patient summary',callback:'Callback reminder',changepw:'Change password',edituser:'Edit user',addref:'Submit referral source'};
  ov.innerHTML = `<div class="mbox">
    <div class="mhead">
      <span style="font-weight:600;font-size:15px;color:${NAVY}">${titles[S.modal.type]||''}</span>
      <button id="mcls" style="background:none;border:none;font-size:22px;color:#667085;cursor:pointer;line-height:1">×</button>
    </div>
    <div class="mbody" id="mbody">${modalBody()}</div>
  </div>`;
  ov.onclick = e => { if(e.target===ov) closeModal(); };
  document.body.appendChild(ov);
  $('mcls').onclick = closeModal;
  bindModalBody();
}

function closeModal() {
  S.modal = null;
  const ov = $('ov'); if(ov) ov.remove();
  rerender();
}

function modalBody() {
  const {type, data} = S.modal;
  if (type==='add'||type==='edit') return formHTML(data);
  if (type==='view') return viewHTML(data);
  if (type==='email') return emailHTML(data);
  if (type==='callback') return callbackHTML(data);
  if (type==='changepw') return pwHTML(data);
  if (type==='edituser') return editUserHTML(data);
  if (type==='addref') return addRefHTML();
  return '';
}

function bindModalBody() {
  const t = S.modal?.type;
  if (t==='add'||t==='edit') bindForm();
  else if (t==='view') bindView();
  else if (t==='email') bindEmail();
  else if (t==='callback') bindCallback();
  else if (t==='changepw') bindPw();
  else if (t==='edituser') bindEditUser();
  else if (t==='addref') bindAddRef();
}

// ── RECORD FORM ─────────────────────────────────────────────────────────────
function formHTML(d) {
  const sO = S.statuses.filter(s=>s.active).map(s=>`<option value="${h(s.label)}" ${d.status===s.label?'selected':''}>${h(s.label)}</option>`).join('');
  const rO = `<option value="">Select…</option>` + S.referrals.filter(r=>r.approved).map(r=>`<option value="${h(r.label)}" ${d.referralSource===r.label?'selected':''}>${h(r.label)}</option>`).join('');
  const eO = ['','Yes','No','Pending'].map(o=>`<option value="${o}" ${d.eligibilityConfirmed===o?'selected':''}>${o||'—'}</option>`).join('');
  const vO = ['','Yes','No'].map(o=>`<option value="${o}" ${d.voicemailLeft===o?'selected':''}>${o||'—'}</option>`).join('');
  return `<div class="g2">
    <div><label class="fl">Status</label><select id="f-st" class="sel">${sO}</select></div>
    <div><label class="fl">Attempt #</label><input id="f-at" class="inp" value="${h(d.attemptNumber)}"/></div>
    <div><label class="fl">Patient Name</label><input id="f-pn" class="inp" value="${h(d.patientName)}" placeholder="Full name"/></div>
    <div><label class="fl">Patient Phone</label><input id="f-pp" class="inp" type="tel" value="${h(d.patientPhone)}"/></div>
  </div>
  <div class="sdiv">Caregiver / Proxy</div>
  <div class="g2">
    <div><label class="fl">Name</label><input id="f-cn" class="inp" value="${h(d.caregiverName)}"/></div>
    <div><label class="fl">Relationship</label><input id="f-cr" class="inp" value="${h(d.caregiverRelationship)}"/></div>
    <div><label class="fl">Phone</label><input id="f-cp" class="inp" type="tel" value="${h(d.caregiverPhone)}"/></div>
    <div><label class="fl">Email</label><input id="f-ce" class="inp" type="email" value="${h(d.caregiverEmail)}"/></div>
  </div>
  <div class="sdiv">Contact Attempt Details</div>
  <div class="g2">
    <div><label class="fl">Referral Source</label><select id="f-rf" class="sel">${rO}</select></div>
    <div><label class="fl">Eligibility Confirmed?</label><select id="f-el" class="sel">${eO}</select></div>
    <div><label class="fl">Date of Attempt</label><input id="f-da" class="inp" type="date" value="${h(d.dateOfAttempt)}"/></div>
    <div><label class="fl">Voicemail Left?</label><select id="f-vm" class="sel">${vO}</select></div>
    <div class="s2"><label class="fl">Callback Date / Time</label><input id="f-cb" class="inp" type="datetime-local" value="${h(d.callbackDateTime)}"/></div>
    <div class="s2"><label class="fl">Outcome / Notes</label><textarea id="f-oc" class="inp" rows="3" style="resize:vertical">${h(d.outcome)}</textarea></div>
    <div class="s2"><label class="fl">Additional Notes</label><textarea id="f-nt" class="inp" rows="2" style="resize:vertical">${h(d.notes)}</textarea></div>
  </div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:0.5px solid #E4E7EC">
    <button id="f-cancel" class="btn btn-outline">Cancel</button>
    <button id="f-save" class="btn btn-navy">Save record</button>
  </div>`;
}
function bindForm() {
  $('f-cancel').onclick = closeModal;
  $('f-save').onclick = () => {
    const d = S.modal.data;
    const rec = {
      id:d.id, status:$('f-st').value, attemptNumber:$('f-at').value,
      patientName:$('f-pn').value, patientPhone:$('f-pp').value,
      caregiverName:$('f-cn').value, caregiverRelationship:$('f-cr').value,
      caregiverPhone:$('f-cp').value, caregiverEmail:$('f-ce').value,
      referralSource:$('f-rf').value, eligibilityConfirmed:$('f-el').value,
      dateOfAttempt:$('f-da').value, voicemailLeft:$('f-vm').value,
      callbackDateTime:$('f-cb').value, outcome:$('f-oc').value, notes:$('f-nt').value,
      createdBy: d.createdBy || S.user.id
    };
    if (rec.id) { S.records = S.records.map(r=>r.id===rec.id?rec:r); }
    else { rec.id = S.nextId++; S.records.push(rec); }
    S.modal = null;
    commit('Record saved');
    render();
  };
}

// ── VIEW ────────────────────────────────────────────────────────────────────
function viewHTML(r) {
  const owner = S.users.find(u=>u.id===r.createdBy);
  const rows = [['Status',badge(r.status)],['Attempt #',h(r.attemptNumber)],['Patient Name',h(r.patientName)],['Patient Phone',h(r.patientPhone)],['Caregiver Name',h(r.caregiverName)],['Relationship',h(r.caregiverRelationship)],['Caregiver Phone',h(r.caregiverPhone)],['Caregiver Email',h(r.caregiverEmail)],['Referral Source',h(r.referralSource)],['Eligibility',eligBadge(r.eligibilityConfirmed)],['Date of Attempt',h(r.dateOfAttempt)],['Voicemail Left',h(r.voicemailLeft)]];
  const g = rows.map(([l,v])=>`<div class="dr"><div class="dl">${l}</div><div class="dv">${v||'—'}</div></div>`).join('');
  const ce = canEdit(r);
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:8px">${g}
    <div class="dr s2" style="grid-column:span 2"><div class="dl">Callback</div><div class="dv">${r.callbackDateTime?r.callbackDateTime.replace('T',' '):'—'}</div></div>
    <div class="dr" style="grid-column:span 2"><div class="dl">Outcome / Notes</div><div class="dv">${h(r.outcome)||'—'}</div></div>
    <div class="dr" style="grid-column:span 2"><div class="dl">Additional Notes</div><div class="dv">${h(r.notes)||'—'}</div></div>
    ${owner?`<div class="dr" style="grid-column:span 2"><div class="dl">Created by</div><div class="dv">${h(owner.name)}</div></div>`:''}
  </div>
  <div style="display:flex;gap:8px;padding-top:14px;border-top:0.5px solid #E4E7EC;flex-wrap:wrap">
    ${ce?`<button id="v-edit" class="btn btn-navy">Edit</button>`:''}
    <button id="v-email" class="btn btn-teal">✉ Email summary</button>
    <button id="v-cb" class="btn btn-outline">📅 Callback</button>
    ${ce?`<button id="v-del" class="btn btn-red">Delete</button>`:''}
    <button id="v-close" class="btn btn-outline" style="margin-left:auto">Close</button>
  </div>`;
}
function bindView() {
  const r = S.modal.data;
  const ve = $('v-edit'); if(ve) ve.onclick = () => openModal('edit', {...r});
  $('v-email').onclick = () => openModal('email', r);
  $('v-cb').onclick = () => openModal('callback', r);
  const vd = $('v-del'); if(vd) vd.onclick = () => {
    if(confirm('Delete this record?')) { S.records=S.records.filter(x=>x.id!==r.id); S.modal=null; commit('Record deleted'); render(); }
  };
  $('v-close').onclick = closeModal;
}

function bindEmail() {
  $('em-cancel').onclick = closeModal;
  $('em-def').onclick = () => {
    window.open(`mailto:${encodeURIComponent($('em-to').value)}?subject=${encodeURIComponent($('em-sub').value)}&body=${encodeURIComponent($('em-body').value)}`);

  };
  $('em-ol').onclick = () => {
    const body = $('em-body').value.replace(/\n/g,'<br>');
    window.open(`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent($('em-to').value)}&subject=${encodeURIComponent($('em-sub').value)}&body=${encodeURIComponent(body)}`,'_blank');
    toast('Opening in Outlook...'); closeModal();
  };
}

// ── CALLBACK ─────────────────────────────────────────────────────────────────
function callbackHTML(r) {
  return `<div style="background:#F5F7FA;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px">
    <div style="font-weight:600;color:${NAVY};margin-bottom:4px">${h(r.patientName)}</div>
    <div style="color:#667085">${h(r.patientPhone)} · ${h(r.status)}</div>
    ${r.callbackDateTime?`<div style="color:${TEAL};margin-top:4px;font-weight:500">Scheduled: ${h(r.callbackDateTime.replace('T',' '))}</div>`:''}
  </div>
  <div style="margin-bottom:12px"><label class="fl">Callback Date / Time</label><input id="cb-dt" class="inp" type="datetime-local" value="${h(r.callbackDateTime||'')}"/></div>
  <div style="margin-bottom:16px"><label class="fl">Reminder note</label><input id="cb-nt" class="inp" value="Callback: ${h(r.patientName)}"/></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button id="cb-gcal" class="btn btn-navy" style="flex:1">📅 Add to Google Calendar</button>
    <button id="cb-ol" class="btn btn-blue" style="flex:1">📧 Outlook reminder</button>
  </div>
  <div style="margin-top:12px;font-size:11px;color:#667085;text-align:center">Reminder sent to: ${h(S.user.email)}</div>`;
}
function bindCallback() {
  const r = S.modal.data;
  $('cb-gcal').onclick = () => {
    const dt = $('cb-dt').value;
    if(!dt) { toast('Set a date/time first','error'); return; }
    const [date,time] = dt.split('T');
    const [yr,mo,dy] = date.split('-');
    const [hr,mn] = (time||'09:00').split(':');
    const s = `${yr}${mo}${dy}T${hr}${mn}00`;
    const e = `${yr}${mo}${dy}T${String(parseInt(hr)+1).padStart(2,'0')}${mn}00`;
    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent($('cb-nt').value)}&dates=${s}/${e}`,'_blank');
    toast('Calendar opened'); closeModal();
  };
  $('cb-ol').onclick = () => {
    const sub = `Callback Reminder: ${r.patientName}`;
    const body = `Hi ${S.user.name},<br><br>Callback reminder:<br>Patient: ${r.patientName}<br>Phone: ${r.patientPhone}<br>Scheduled: ${$('cb-dt').value||'TBD'}<br>Notes: ${r.outcome||r.notes||'—'}`;
    window.open(`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(S.user.email)}&subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`,'_blank');
    toast('Opening in Outlook...'); closeModal();
  };
}

// ── CHANGE PASSWORD ──────────────────────────────────────────────────────────
function pwHTML(data) {
  const target = S.users.find(u=>u.id===data.userId);
  const own = data.userId === S.user.id;
  return `<div style="display:grid;gap:12px">
    <div style="background:#F5F7FA;border-radius:8px;padding:10px 14px;font-size:13px;color:#344054">
      Changing password for: <strong>${h(target?.name||'')}</strong>
    </div>
    ${own?`<div><label class="fl">Current password</label><input id="pw-cur" type="password" class="inp" placeholder="Current password"/></div>`:''}
    <div><label class="fl">New password</label><input id="pw-new" type="password" class="inp" placeholder="Min 6 characters"/></div>
    <div><label class="fl">Confirm new password</label><input id="pw-con" type="password" class="inp" placeholder="Repeat new password"/></div>
    <div id="pw-err" class="hide" style="background:#FAECE7;color:#993C1D;border-radius:6px;padding:8px 12px;font-size:13px"></div>
  </div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:0.5px solid #E4E7EC">
    <button id="pw-cancel" class="btn btn-outline">Cancel</button>
    <button id="pw-save" class="btn btn-navy">Update password</button>
  </div>`;
}
function bindPw() {
  const data = S.modal.data;
  const own = data.userId === S.user.id;
  $('pw-cancel').onclick = closeModal;
  $('pw-save').onclick = () => {
    const target = S.users.find(u=>u.id===data.userId);
    const cur = own ? $('pw-cur')?.value : null;
    const nw = $('pw-new').value;
    const con = $('pw-con').value;
    const err = $('pw-err');
    const showErr = msg => { err.textContent=msg; err.classList.remove('hide'); };
    if (own && cur !== target.password) { showErr('Current password is incorrect.'); return; }
    if (nw.length < 6) { showErr('New password must be at least 6 characters.'); return; }
    if (nw !== con) { showErr('Passwords do not match.'); return; }
    S.users = S.users.map(u=>u.id===data.userId?{...u,password:nw}:u);
    if (data.userId===S.user.id) S.user = {...S.user, password:nw};
    commit('Password updated'); closeModal();
  };
}

// ── EDIT USER ────────────────────────────────────────────────────────────────
function editUserHTML(u) {
  return `<div style="display:grid;gap:12px">
    <div><label class="fl">Full Name</label><input id="eu-nm" class="inp" value="${h(u.name)}"/></div>
    <div><label class="fl">Email</label><input id="eu-em" class="inp" type="email" value="${h(u.email)}"/></div>

function bindEditUser() {
  const u = S.modal.data;
  $('eu-cancel').onclick = closeModal;
  $('eu-pw').onclick = () => openModal('changepw', {userId: u.id});
  $('eu-save').onclick = () => {
    S.users = S.users.map(x=>x.id===u.id?{...x,name:$('eu-nm').value.trim(),email:$('eu-em').value.trim(),role:$('eu-ro').value,active:$('eu-ac').value==='true'}:x);
    commit('User updated'); closeModal();
  };
}

// ── ADD REF ───────────────────────────────────────────────────────────────────
function addRefHTML() {
  return `<p style="font-size:13px;color:#667085;margin-bottom:12px">Submitted sources require admin approval before appearing in records.</p>
  <label class="fl">Referral source name</label>
  <input id="ar-nm" class="inp" placeholder="e.g. Social Media" style="margin-bottom:16px"/>
  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button id="ar-cancel" class="btn btn-outline">Cancel</button>
    <button id="ar-save" class="btn btn-navy">Submit for approval</button>
  </div>`;
}
function bindAddRef() {
  $('ar-cancel').onclick = closeModal;
  $('ar-save').onclick = () => {
    const v = $('ar-nm').value.trim();
    if (!v) return;
    S.referrals.push({id:uid(),label:v,approved:false,correction:null});
    commit('Submitted for approval'); closeModal();
  };
}

// ── ADMIN PAGE ────────────────────────────────────────────────────────────────
function adminPage() {
  const pending = S.referrals.filter(r=>!r.approved);
  const approved = S.referrals.filter(r=>r.approved);
  const t = S.adminTab;

  const usersTab = `<div>
    <div class="card" style="margin-bottom:16px;overflow-x:auto">
      <div style="padding:12px 16px;border-bottom:0.5px solid #E4E7EC;font-weight:600;color:${NAVY};font-size:14px">Current Users</div>
      <table><thead><tr>${['Name','Email','Role','Status','Actions'].map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${S.users.map(u=>`<tr>
        <td style="font-weight:500">${h(u.name)}</td>
        <td style="color:#667085;font-size:12px">${h(u.email)}</td>
        <td><span class="badge" style="background:${u.role==='admin'?'#EEEDFE':'#E6F1FB'};color:${u.role==='admin'?'#533AB7':'#185FA5'}">${u.role}</span></td>
        <td><span class="badge" style="background:${u.active?'#E1F5EE':'#F2F4F7'};color:${u.active?'#0F6E56':'#667085'}">${u.active?'Active':'Inactive'}</span></td>
        <td><div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-outline adm-edit-user" data-id="${u.id}" style="font-size:11px;padding:3px 10px">Edit</button>
          <button class="btn btn-outline adm-reset-pw" data-id="${u.id}" style="font-size:11px;padding:3px 10px">Reset PW</button>
          <button class="btn btn-outline adm-invite" data-id="${u.id}" style="font-size:11px;padding:3px 10px">Invite</button>
        </div></td>
      </tr>`).join('')}</tbody></table>
    </div>
    <div class="card" style="padding:16px 20px">
      <div style="font-weight:600;color:${NAVY};font-size:14px;margin-bottom:14px">Add New User</div>
      <div class="g2" style="margin-bottom:12px">
        <div><label class="fl">Full Name</label><input id="nu-nm" class="inp" placeholder="Jane Smith"/></div>
        <div><label class="fl">Email</label><input id="nu-em" class="inp" type="email" placeholder="jane@medorahealthgroup.com"/></div>
        <div><label class="fl">Temp Password</label><input id="nu-pw" class="inp" placeholder="Temporary password"/></div>
        <div><label class="fl">Role</label><select id="nu-ro" class="sel"><option value="user">User</option><option value="admin">Admin</option></select></div>
      </div>
      <button id="nu-add" class="btn btn-navy">Add user</button>
    </div>
  </div>`;

  const statusesTab = `<div>
    <div class="card" style="margin-bottom:16px;overflow-x:auto">
      <div style="padding:12px 16px;border-bottom:0.5px solid #E4E7EC;font-weight:600;color:${NAVY};font-size:14px">Patient Statuses</div>
      <table><thead><tr>${['Status','Preview','Active','Action'].map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${S.statuses.map(s=>`<tr>
        <td style="font-weight:500">${h(s.label)}</td>
        <td>${badge(s.label)}</td>
        <td><span class="badge" style="background:${s.active?'#E1F5EE':'#F2F4F7'};color:${s.active?'#0F6E56':'#667085'}">${s.active?'Yes':'No'}</span></td>
        <td><button class="btn btn-outline adm-tog-st" data-id="${s.id}" style="font-size:11px;padding:3px 10px;color:${s.active?'#993C1D':'#0F6E56'}">${s.active?'Deactivate':'Activate'}</button></td>
      </tr>`).join('')}</tbody></table>
    </div>
    <div class="card" style="padding:16px 20px">
      <div style="font-weight:600;color:${NAVY};font-size:14px;margin-bottom:14px">Add New Status</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 16px;margin-bottom:12px">
        <div><label class="fl">Label</label><input id="ns-lb" class="inp" placeholder="e.g. Waitlisted"/></div>
        <div><label class="fl">Text Color</label><input id="ns-co" type="color" value="#1B2A4A" style="width:100%;height:38px;border-radius:6px;border:0.5px solid #D0D5DD;cursor:pointer"/></div>
        <div><label class="fl">Background Color</label><input id="ns-bg" type="color" value="#E8ECF4" style="width:100%;height:38px;border-radius:6px;border:0.5px solid #D0D5DD;cursor:pointer"/></div>
      </div>
      <button id="ns-add" class="btn btn-navy">Add status</button>
    </div>
  </div>`;

  const refsTab = `<div>
    ${pending.length>0?`<div class="card" style="margin-bottom:16px;border-color:#F0957B">
      <div style="padding:12px 16px;border-bottom:0.5px solid #F2F4F7;font-weight:600;color:#993C1D;font-size:14px">⚠ Pending Approval (${pending.length})</div>
      ${pending.map(r=>`<div style="padding:12px 16px;border-bottom:0.5px solid #F2F4F7;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <span style="font-weight:500;font-size:13px">${h(r.label)}</span>
        <div style="display:flex;gap:8px">
          <button class="btn adm-apr" data-id="${r.id}" style="background:#E1F5EE;color:#0F6E56;font-size:12px;padding:5px 14px">✓ Approve</button>
          <button class="btn adm-rej" data-id="${r.id}" style="background:#FAECE7;color:#993C1D;font-size:12px;padding:5px 14px">✗ Reject/Correct</button>
        </div>
      </div>`).join('')}
    </div>`:''}
    <div class="card" style="margin-bottom:16px">
      <div style="padding:12px 16px;border-bottom:0.5px solid #E4E7EC;font-weight:600;color:${NAVY};font-size:14px">Approved Referral Sources</div>
      ${approved.map(r=>`<div style="padding:10px 16px;border-bottom:0.5px solid #F2F4F7;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;font-weight:500">${h(r.label)}</span>
        <button class="btn adm-del-ref" data-id="${r.id}" style="font-size:11px;color:#993C1D;background:none;border:none;padding:0">Remove</button>
      </div>`).join('')}
    </div>
    <div class="card" style="padding:16px 20px">
      <div style="font-weight:600;color:${NAVY};font-size:14px;margin-bottom:6px">Add Referral Source</div>
      <div style="display:flex;gap:10px">
        <input id="nr-lb" class="inp" placeholder="e.g. Social Media"/>
        <button id="nr-add" class="btn btn-navy" style="white-space:nowrap">Add</button>
      </div>
    </div>
  </div>`;

  return `<div style="max-width:900px;margin:0 auto;padding:20px 14px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div style="font-size:20px;font-weight:700;color:${NAVY}">Admin Panel</div>
      ${pending.length>0?`<span class="badge" style="background:#FAECE7;color:#993C1D">${pending.length} pending</span>`:''}
    </div>
    <div style="display:flex;gap:4px;background:#F5F7FA;padding:4px;border-radius:8px;margin-bottom:20px;width:fit-content">
      <button class="tab ${t==='users'?'on':''}" id="at-users">👤 Users</button>
      <button class="tab ${t==='statuses'?'on':''}" id="at-statuses">🏷 Statuses</button>
      <button class="tab ${t==='referrals'?'on':''}" id="at-referrals">📋 Referrals${pending.length>0?` (${pending.length})`:''}</button>
    </div>
    <div id="admin-content">
      ${t==='users'?usersTab:t==='statuses'?statusesTab:refsTab}
    </div>
  </div>`;
}

// Admin bindings happen after rerender via delegated events
document.addEventListener('click', function(e) {
  // Admin tabs
  if (e.target.id==='at-users') { S.adminTab='users'; rerender(); return; }
  if (e.target.id==='at-statuses') { S.adminTab='statuses'; rerender(); return; }
  if (e.target.id==='at-referrals') { S.adminTab='referrals'; rerender(); return; }

  const btn = e.target.closest('button');
  if (!btn) return;

  // User management
  if (btn.classList.contains('adm-edit-user')) { const u=S.users.find(x=>x.id===btn.dataset.id); if(u) openModal('edituser',{...u}); return; }
  if (btn.classList.contains('adm-reset-pw')) { openModal('changepw',{userId:btn.dataset.id}); return; }
  if (btn.classList.contains('adm-invite')) {
    const u=S.users.find(x=>x.id===btn.dataset.id); if(!u) return;
    const sub='Invitation to Medora Health Group Patient Tracking';
    const body=`Hi ${u.name},<br><br>You have been added to the Medora Health Group Patient Tracking Portal.<br><br>Login: ${u.email}<br>Temporary password: ${u.password}<br><br>– Medora Health Group`;
    window.open(`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(u.email)}&subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`,'_blank');
    toast(`Invite opened for ${u.email}`);
    return;
  }
  if (btn.id==='nu-add') {
    const nm=$('nu-nm')?.value.trim(),em=$('nu-em')?.value.trim(),pw=$('nu-pw')?.value.trim(),ro=$('nu-ro')?.value;
    if(!nm||!em||!pw){toast('Fill in all fields','error');return;}
    if(S.users.find(u=>u.email.toLowerCase()===em.toLowerCase())){toast('Email already exists','error');return;}
    S.users.push({id:uid(),name:nm,email:em,role:ro,password:pw,active:true});
    commit('User added'); rerender(); return;
  }

  // Status management
  if (btn.classList.contains('adm-tog-st')) { S.statuses=S.statuses.map(s=>s.id===btn.dataset.id?{...s,active:!s.active}:s); commit('Status updated'); rerender(); return; }
  if (btn.id==='ns-add') {
    const lb=$('ns-lb')?.value.trim(),co=$('ns-co')?.value,bg=$('ns-bg')?.value;
    if(!lb){toast('Label required','error');return;}
    S.statuses.push({id:uid(),label:lb,color:co,bg:bg,active:true});
    commit('Status added'); rerender(); return;
  }

  // Referral management
  if (btn.classList.contains('adm-apr')) { S.referrals=S.referrals.map(r=>r.id===btn.dataset.id?{...r,approved:true}:r); commit('Approved'); rerender(); return; }
  if (btn.classList.contains('adm-rej')) {
    const c=prompt('Enter correct name (blank to remove):'); if(c===null) return;
    if(c.trim()) S.referrals=S.referrals.map(r=>r.id===btn.dataset.id?{...r,approved:false,correction:c.trim()}:r);
    else S.referrals=S.referrals.filter(r=>r.id!==btn.dataset.id);
    commit('Updated'); rerender(); return;
  }
  if (btn.classList.contains('adm-del-ref')) { S.referrals=S.referrals.filter(r=>r.id!==btn.dataset.id); commit('Removed'); rerender(); return; }
  if (btn.id==='nr-add') {
    const v=$('nr-lb')?.value.trim(); if(!v) return;
    S.referrals.push({id:uid(),label:v,approved:true}); commit('Referral source added'); rerender(); return;
  }
});

// ── START ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
